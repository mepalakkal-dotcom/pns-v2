name: Build Portable PolyhedralSplines.exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download SurfLab source
        shell: pwsh
        run: |
          curl -L -o source.zip "https://bitbucket.org/surflab/polyhedral_splines/get/master.zip"
          Expand-Archive source.zip -DestinationPath .
          $folder = Get-ChildItem -Directory | Where-Object { $_.Name -like "surflab-*" } | Select-Object -First 1
          Rename-Item $folder.FullName "source"

      - name: Configure (normal dynamic runtime — default)
        shell: pwsh
        run: |
          cd source
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        shell: pwsh
        run: |
          cd source
          cmake --build build --config Release --parallel

      - name: Find the .exe
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem source/build -Recurse -Filter "PolyhedralSplines.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error ".exe not found"; exit 1 }
          echo "EXE=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "EXE_DIR=$($exe.Directory.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "Built: $($exe.FullName)"

      - name: Bundle .exe with required Visual C++ Runtime DLLs
        shell: pwsh
        run: |
          $bundle = "bundle"
          New-Item -ItemType Directory -Path $bundle | Out-Null

          # Copy the exe
          Copy-Item "${{ steps.find.outputs.EXE }}" $bundle

          # Locate the Visual C++ redistributable DLLs installed with the MSVC toolchain.
          # These DLLs are what would normally be installed by the VC++ Redistributable installer.
          # By shipping them in the same folder as the exe, Windows finds them automatically
          # without any system-wide installation.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          Write-Host "Visual Studio at: $vsPath"

          # Find the x64 Redist folder
          $redistRoot = Join-Path $vsPath "VC\Redist\MSVC"
          $redistVersion = Get-ChildItem $redistRoot -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $crtFolder = Join-Path $redistVersion.FullName "x64\Microsoft.VC143.CRT"
          Write-Host "CRT folder: $crtFolder"

          # Copy all the DLLs a dynamic-runtime .exe needs
          $dlls = @("msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll", "concrt140.dll")
          foreach ($dll in $dlls) {
            $src = Join-Path $crtFolder $dll
            if (Test-Path $src) {
              Copy-Item $src $bundle
              Write-Host "Bundled: $dll"
            } else {
              Write-Host "Not found (may not be needed): $dll"
            }
          }

          # Also bundle the Universal CRT DLLs from the Windows SDK
          $sdkRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\Redist"
          $sdkVersion = Get-ChildItem $sdkRoot -Directory -Filter "10.*" | Sort-Object Name -Descending | Select-Object -First 1
          if ($sdkVersion) {
            $ucrtFolder = Join-Path $sdkVersion.FullName "ucrt\DLLs\x64"
            if (Test-Path $ucrtFolder) {
              Write-Host "UCRT folder: $ucrtFolder"
              Copy-Item "$ucrtFolder\*.dll" $bundle -ErrorAction SilentlyContinue
              Write-Host "Bundled UCRT DLLs"
            }
          }

          # List final bundle contents
          Write-Host ""
          Write-Host "==== FINAL BUNDLE CONTENTS ===="
          Get-ChildItem $bundle | Format-Table Name, Length

          # Package it
          Compress-Archive -Path "$bundle\*" -DestinationPath PolyhedralSplines_portable.zip
          Write-Host "Packaged: PolyhedralSplines_portable.zip"

      - name: Upload portable bundle
        uses: actions/upload-artifact@v4
        with:
          name: PolyhedralSplines_portable_windows
          path: PolyhedralSplines_portable.zip
          retention-days: 90
