name: Build Standalone PolyhedralSplines.exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download SurfLab source
        shell: pwsh
        run: |
          curl -L -o source.zip "https://bitbucket.org/surflab/polyhedral_splines/get/master.zip"
          Expand-Archive source.zip -DestinationPath .
          $folder = Get-ChildItem -Directory | Where-Object { $_.Name -like "surflab-*" } | Select-Object -First 1
          Rename-Item $folder.FullName "source"

      - name: Patch CMakeLists to propagate static runtime to OpenMesh
        shell: pwsh
        run: |
          $path = "source/CMakeLists.txt"
          $content = Get-Content $path -Raw

          # Inject the runtime library flag into the OpenMesh ExternalProject_Add CMAKE_ARGS.
          # We do this by adding a new line right after the existing CMAKE_ARGS entries.
          $needle  = "-DBUILD_SHARED_LIBS=`${OPENMESH_BUILD_SHARED}"
          $replace = "-DBUILD_SHARED_LIBS=`${OPENMESH_BUILD_SHARED}`r`n               -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"

          if ($content -notmatch [regex]::Escape($needle)) {
            Write-Error "Failed to find needle to patch"
            exit 1
          }

          $content = $content.Replace($needle, $replace)
          Set-Content -Path $path -Value $content -NoNewline
          Write-Host "Patched CMakeLists.txt successfully."

      - name: Configure
        shell: pwsh
        run: |
          cd source
          cmake -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DOPENMESH_BUILD_SHARED=OFF

      - name: Build Release
        shell: pwsh
        run: |
          cd source
          cmake --build build --config Release --parallel

      - name: Find the .exe
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem source/build -Recurse -Filter "PolyhedralSplines.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error ".exe not found"; exit 1 }
          echo "EXE=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "Built: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 2)) MB)"

      - name: Upload standalone .exe
        uses: actions/upload-artifact@v4
        with:
          name: PolyhedralSplines_standalone_windows
          path: ${{ steps.find.outputs.EXE }}
          retention-days: 90
